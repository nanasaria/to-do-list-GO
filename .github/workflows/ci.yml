name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Check formatting (gofmt)
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "Arquivos fora do gofmt:"
            echo "$files"
            exit 1
          fi

      - name: Download deps
        run: go mod download

      - name: Run tests
        run: go test ./... -v

      - name: Build
        run: go build ./...